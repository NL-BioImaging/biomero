[SSH]
# -------------------------------------
# SSH settings
# -------------------------------------
# The alias for the SLURM SSH connection
host=slurm
# Set the rest of your SSH configuration in your SSH config under this host name/alias
# Or in e.g. /etc/fabric.yml (see Fabric's documentation for details on config loading)

[SLURM]
# -------------------------------------
# Slurm settings
# -------------------------------------
# General settings for where to find things on the Slurm cluster.
# -------------------------------------
# PATHS
# -------------------------------------
# The path on SLURM entrypoint for storing datafiles
#
# Note: 
# This example is relative to the Slurm user's home dir
slurm_data_path=my-scratch/data
# The path on SLURM entrypoint for storing container image files
#
# Note: 
# This example is relative to the Slurm user's home dir
slurm_images_path=my-scratch/singularity_images/workflows
# The path on SLURM entrypoint for storing converter image files
#
# Note: 
# This example is relative to the Slurm user's home dir
slurm_converters_path=my-scratch/singularity_images/converters
# The path on SLURM entrypoint for storing the slurm job scripts
#
# Note: 
# This example is relative to the Slurm user's home dir
slurm_script_path=my-scratch/slurm-scripts
# Path to bind a folder to slurm/singularity jobs via APPTAINER_BINDPATH environment variable
# Required when by default data folder is not bound to singularity container.
# Some deployments require it so workflow containers and BIOMERO import code see
# the same data path. For remote Slurm clusters, set this to the BIOMERO data
# directory shared between the login and worker nodes; for local Slurm examples,
# use the matching data directory
#
# If your HPC administrator tells you to set APPTAINER_BINDPATH, configure this parameter.
# Note: 
# This example is relative to the Slurm user's home dir
slurm_data_bind_path=my-scratch/data
# Optional paths for Apptainer/Singularity temporary files and cache during
# image pulls/builds. Configure these when the default /tmp on your login node
# or worker node is too small for large containers.
#
# A common recommendation on HPC systems is to point these to scratch storage,
# for example:
#   apptainer_tmpdir=/scratchdata/$USER/.apptainer-tmp
#   apptainer_cachedir=/scratchdata/$USER/.apptainer-cache
#
# BIOMERO uses these settings when preparing workflow and converter images.
# If unset, BIOMERO leaves Apptainer/Singularity at its runtime defaults.
#
# Can be overridden by the BIOMERO_APPTAINER_TMPDIR /
# BIOMERO_APPTAINER_CACHEDIR environment variables.
#apptainer_tmpdir=
#apptainer_cachedir=
# Set partition to run conversion jobs when no default partition is set on your HPC
#
slurm_conversion_partition=cpu-short
# -------------------------------------
# SACCT history window
# -------------------------------------
# How far back to look when listing jobs via sacct.
# By default (nothing set here), BIOMERO looks back to 2023-01-01.
#
# Option 1: set an absolute start date (ISO format YYYY-MM-DD)
#sacct_start_time=2024-01-01
#
# Option 2: set a rolling window in days (relative to today)
# This overrides sacct_start_time if both are set.
#sacct_days_ago=7
#
# Both options can also be overridden at runtime via environment variables:
#   BIOMERO_SACCT_START_TIME   (absolute date, e.g. 2024-01-01)
#   BIOMERO_SACCT_START_DAYS_AGO  (integer, e.g. 7 — takes highest priority)
# -------------------------------------
# REPOSITORIES
# -------------------------------------
# Optional Git repository to pull Slurm scripts from.
#
# Note: 
# Leave this empty to use BIOMERO-generated job scripts based on the
# job_template and descriptor.json. This is the recommended default. A custom
# repository is an advanced/backward-compatibility option and NL-BIOMERO uses
# it as provided.
#
# Example:
#slurm_script_repo=https://github.com/TorecLuik/slurm-scripts
slurm_script_repo=
# -------------------------------------
# Processing settings
# -------------------------------------
# All options in this section are OFF by default to preserve backward-compatible
# behaviour.  Enable only the ones your cluster requires.

# --- env-file submission ---
# When enabled, BIOMERO writes all job environment variables to a per-job file
# on the cluster and passes the file path as the first argument ($1) to the job
# script, instead of relying on SSH environment variable propagation.
# Enabling this also injects a small sourcing block into generated job scripts
# so they read $1 at startup (idempotent; existing scripts are unaffected).
# Enable when your cluster does not forward the SSH session environment into
# sbatch jobs (e.g. AcceptEnv is restricted and inline_ssh_env does not work).
# Default: false.
#
# NOTE: Changing this setting requires re-running the SLURM Init script so that
# job scripts are regenerated with (or without) the env-file sourcing block.
# 
# Can be overridden by the BIOMERO_ENV_FILE_SUBMISSION environment variable.
#env_file_submission=false

# --- GPU flag injection ---
# When enabled, BIOMERO rewrites "singularity run --nv" in generated job scripts
# to a conditional GPU_FLAG variable driven by the USE_GPU environment variable.
# This lets one script run on both CPU and GPU partitions without manual edits.
# Enable only if your generated scripts contain "singularity run --nv" and you
# want GPU usage to be controlled at submission time via the use_gpu workflow
# parameter.  Leave off if your scripts already handle GPU flags themselves, or
# if GPU resources are configured per-workflow in the [MODELS] section.
# Default: false.
#
# NOTE: Changing this setting requires re-running the SLURM Init script so that
# job scripts are regenerated with (or without) the GPU flag substitution.
# 
# Can be overridden by the BIOMERO_INJECT_GPU_FLAG environment variable.
#inject_gpu_flag=false

# --- Default GPU Slurm resources ---
# These are applied as sbatch fallback defaults when either:
# - the workflow parameter use_gpu=true is submitted, or
# - a workflow-specific <name>_use_gpu=true default is configured in [MODELS].
#
# When inject_gpu_flag=true, a submission-time use_gpu parameter can still turn
# GPU usage on or off. Without inject_gpu_flag, <name>_use_gpu=true acts as an
# always-on per-workflow GPU default.
#
# The generic GPU settings are only used when the per-workflow [MODELS] job
# params do not already set --partition and the configured GPU resource flag
# (for example --gres or --gpus). Per-workflow settings always take precedence.
# Leave blank if your cluster does not require explicit partition/GRES for GPU
# jobs, or if you manage GPU resources entirely through per-workflow config.
#
# Can be overridden by the BIOMERO_GPU_PARTITION / BIOMERO_GPU_GRES environment variables.
#gpu_partition=gpu_a100
#gpu_gres=gpu:a100:1

# Choose whether BIOMERO should use --gres or --gpus for the generic GPU
# fallback above. Per-workflow job params can already set either.
# Default: gres.
#
# Can be overridden by the BIOMERO_GPU_RESOURCE_FLAG environment variable.
#gpu_resource_flag=gres

# Submit image pulls/builds via sbatch instead of kicking off a background
# nohup command on the login node. This is opt-in because it changes where the
# compute cost is paid. 
# Default: false.
#
# Can be overridden by the BIOMERO_IMAGE_PULL_VIA_SBATCH environment variable.
# Can be overridden by the BIOMERO_PULL_CPUS / BIOMERO_PULL_MEM environment variables.
#slurm_image_pull_via_sbatch=false
#image_pull_cpus=8
#image_pull_mem=32G

# --- ZIP command ---
# ZIP command to use on the cluster for archiving result files.
# Leave blank to auto-detect (tries 7z then 7za in PATH).
# Set explicitly if your cluster provides only one variant, e.g.:
#   slurm_zip_cmd=7za
#
# Can be overridden by the BIOMERO_SLURM_ZIP_CMD environment variable.
#slurm_zip_cmd=

[ANALYTICS]
# =====================================
# Analytics Settings
# =====================================
# General settings to control workflow tracking 
# and listeners for detailed monitoring and insights.

# -------------------------------------
# WORKFLOW TRACKER SETTINGS
# -------------------------------------
# The workflow tracker collects and logs information 
# on workflow execution, job statuses, and related analytics.
# This is the main switch to enable or disable workflow 
# tracking as a whole.
#
# If disabled, none of the listeners below will be 
# activated, regardless of their individual settings.
#
# Options: True, False
track_workflows = True

# -------------------------------------
# DATABASE CONFIGURATION
# -------------------------------------
# SQLAlchemy database connection URL for persisting 
# workflow analytics data. This setting allows configuring 
# the database connection for storing the tracking and analytics 
# data. If no value is set here, environment variables 
# will be used as the default.
# 
# Example:
# sqlalchemy_url=postgresql+psycopg2://user:password@localhost:5432/yourdatabase
#
# See https://docs.sqlalchemy.org/en/20/core/engines.html#database-urls
# for more info and examples of database URLs supported by sqlalchemy
#
# Note: If SQLALCHEMY_URL is set as an environment variable, 
# it will override this setting.
# sqlalchemy_url=

# -------------------------------------
# LISTENER SETTINGS
# -------------------------------------
# Listeners provide detailed monitoring and insights for 
# specific aspects of workflow execution. Each listener 
# can be enabled or disabled independently.
#
# NOTE: The listeners below will only be active if 
# track_workflows=True.

# -------------------------------------
# JOB ACCOUNTING LISTENER
# -------------------------------------
# Monitors job accounting data such as resource usage 
# (CPU, memory) and SLURM job states (completed, failed).
#
# Options: True, False
enable_job_accounting = True

# -------------------------------------
# JOB PROGRESS LISTENER
# -------------------------------------
# Tracks the progress of SLURM jobs, capturing intermediate 
# statuses for real-time insights into job execution.
#
# Options: True, False
enable_job_progress = True

# -------------------------------------
# WORKFLOW ANALYTICS LISTENER
# -------------------------------------
# Provides detailed insights into workflow performance, 
# including execution times, bottlenecks, and overall 
# efficiency.
#
# Options: True, False
enable_workflow_analytics = True

# -------------------------------------
# ANALYTICS VIEW TABLE REBUILD WINDOW
# -------------------------------------
# When the SLURM Init script resets analytics view tables, BIOMERO replays
# the event history to rebuild the views. On large installations this can
# take several minutes. These settings cap how far back the replay goes.
#
# Option 1: set an absolute cutoff date (ISO format YYYY-MM-DD)
# Only events from this date onward will be replayed.
#analytics_rebuild_start_time=2026-01-01
#
# Option 2: set a rolling window in days (relative to today)
# This overrides analytics_rebuild_start_time if both are set.
#analytics_rebuild_days_ago=30
#
# Both options can also be overridden at runtime via environment variables:
#   BIOMERO_ANALYTICS_REBUILD_START_TIME   (absolute date, e.g. 2026-01-01)
#   BIOMERO_ANALYTICS_REBUILD_DAYS_AGO     (integer, e.g. 30 — takes highest priority)
#
# Leave both commented out to replay the full event history (default).
# Note: view tables built from a partial history will not show older jobs.

[CONVERTERS]
# -------------------------------------
# Converters settings
# -------------------------------------
# Settings for linking to external converters.
# 
# By default, BIOMERO exports images as ZARR to the HPC.
# But, the workflow you want to execute might require 
# a different filetype. E.g. most of our example workflows
# require TIFF input files. 
#
# By default we will build a converter on Slurm for you.
# Theoretically you can add other converters here to pull
# those instead. These should be available on dockerhub.
# 
# -------------------------------------
# ZARR TO TIFF
# -------------------------------------
# Uncomment this if you want to pull the image instead of 
# build it. E.g. if you don't have singularity build rights
# on your Slurm.
#
# Please pin it to a specific version to reduce unforeseen errors.
#
# Key should be the types "X_to_Y" and value should be the docker image
#zarr_to_tiff=cellularimagingcf/convert_zarr_to_tiff:2.0.0


[MODELS]
# -------------------------------------
# Model settings
# -------------------------------------
# Settings for models/singularity images that we want to run on Slurm
#
# NOTE: keys have to be unique, and require a <key>_repo and <key>_image value as well.
#
# NOTE 2: Versions for the repo are highly encouraged! 
# Latest/master can change and cause issues with reproducability!
# We pickup the container version based on the version of the repository.
# For generic master branch, we pick up generic latest container.
# -------------------------------------
# CELLPOSE SEGMENTATION
# -------------------------------------
# The path to store the container on the slurm_images_path
cellpose=cellpose
# The (e.g. github) repository with the descriptor.json file
cellpose_repo=https://github.com/TorecLuik/W_NucleiSegmentation-Cellpose/tree/v1.2.7
# The jobscript in the 'slurm_script_repo'
cellpose_job=jobs/cellpose.sh
# Optional: mark this workflow as GPU-native. This uses the generic
# gpu_partition / gpu_gres fallback above unless overridden by
# cellpose_job_partition, cellpose_job_gres, or cellpose_job_gpus.
#cellpose_use_gpu=true
# Override the default job values for this workflow
# Or add a job value to this workflow
# For more examples of such parameters, google SBATCH parameters.
# If you don't want to override, comment out / delete the line.
# Run CellPose Slurm with 10 GB GPU
cellpose_job_gres=gpu:1g.10gb:1
# e.g. Run on a different partition
# cellpose_job_partition=partition_with_gpu
# -------------------------------------
# STARDIST SEGMENTATION
# -------------------------------------
# The path to store the container on the slurm_images_path
stardist=stardist
# The (e.g. github) repository with the descriptor.json file
stardist_repo=https://github.com/Neubias-WG5/W_NucleiSegmentation-Stardist/tree/v1.3.2
# The jobscript in the 'slurm_script_repo'
stardist_job=jobs/stardist.sh
# -------------------------------------
# CELLPROFILER SEGMENTATION
# -------------------------------------
# The path to store the container on the slurm_images_path
cellprofiler=cellprofiler
# The (e.g. github) repository with the descriptor.json file
cellprofiler_repo=https://github.com/Neubias-WG5/W_NucleiSegmentation-CellProfiler/tree/v1.6.4
# The jobscript in the 'slurm_script_repo'
cellprofiler_job=jobs/cellprofiler.sh
# -------------------------------------
# DEEPCELL SEGMENTATION
# -------------------------------------
# The path to store the container on the slurm_images_path
deepcell=deepcell
# The (e.g. github) repository with the descriptor.json file
deepcell_repo=https://github.com/Neubias-WG5/W_NucleiSegmentation-DeepCell/tree/v.1.4.3
# The jobscript in the 'slurm_script_repo'
deepcell_job=jobs/deepcell.sh
# -------------------------------------
# IMAGEJ SEGMENTATION
# -------------------------------------
# The path to store the container on the slurm_images_path
imagej=imagej
# The (e.g. github) repository with the descriptor.json file
imagej_repo=https://github.com/Neubias-WG5/W_NucleiSegmentation-ImageJ/tree/v1.12.10
# The jobscript in the 'slurm_script_repo'
imagej_job=jobs/imagej.sh
# -------------------------------------
# Mito Segmentation
# -------------------------------------
# The path to store the container on the slurm_images_path
mito_segmentation = mito_segmentation
# The (e.g. github) repository with the descriptor.json file
mito_segmentation_repo = https://github.com/Cellular-Imaging-Amsterdam-UMC/W_MitoSegmentation/tree/v0.0.3
# The jobscript in the 'slurm_script_repo'
mito_segmentation_job = jobs/mitosegmentation.sh
# -------------------------------------
# CELLPROFILER SPOT COUNTING
# -------------------------------------
# The path to store the container on the slurm_images_path
cellprofiler_spot=cellprofiler_spot
# The (e.g. github) repository with the descriptor.json file
cellprofiler_spot_repo=https://github.com/TorecLuik/W_SpotCounting-CellProfiler/tree/v1.0.1
# The jobscript in the 'slurm_script_repo'
cellprofiler_spot_job=jobs/cellprofiler_spot.sh
# -------------------------------------
# CELLEXPANSION SPOT COUNTING
# -------------------------------------
# The path to store the container on the slurm_images_path
cellexpansion=cellexpansion
# The (e.g. github) repository with the descriptor.json file
cellexpansion_repo=https://github.com/TorecLuik/W_CellExpansion/tree/v1.0.1
# The jobscript in the 'slurm_script_repo'
cellexpansion_job=jobs/cellexpansion.sh
# -------------------------------------
# MEASUREMENTS - 2 masks (cell + nucleus)
# -------------------------------------
# The path to store the container on the slurm_images_path
nuclei_measurements=nuclei_measurements
# The (e.g. github) repository with the descriptor.json file
nuclei_measurements_repo=https://github.com/Cellular-Imaging-Amsterdam-UMC/W_Measurements-Nuclei-CellProfiler/tree/v1.0.0
# The jobscript in the 'slurm_script_repo'
nuclei_measurements_job=jobs/nuclei_measurements.sh
# Run Slurm with more GB CPU memory
# nuclei_measurements_job_mem=32GB
# Run Slurm with higher timeout value (d-hh:mm:ss)
# nuclei_measurements_job_time=01:00:00
# -------------------------------------
# MEASUREMENTS - 3 masks (cell + nucleus + aggregate)
# -------------------------------------
# The path to store the container on the slurm_images_path
aggregates_measurements=aggregates_measurements
# The (e.g. github) repository with the descriptor.json file
aggregates_measurements_repo=https://github.com/Cellular-Imaging-Amsterdam-UMC/W_Measurements-CellProfiler/tree/v1.1.0
# The jobscript in the 'slurm_script_repo'
aggregates_measurements_job=jobs/aggregates_measurements.sh
# Run Slurm with more GB CPU memory
# aggregates_measurements_job_mem=32GB
# Run Slurm with higher timeout value (d-hh:mm:ss)
# aggregates_measurements_job_time=01:00:00